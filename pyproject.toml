[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aig-guardian"
version = "0.2.0"
description = "AI Guardian — Scan, score, and filter LLM requests for security threats. Detect, remediate, and audit AI interactions with OWASP-aligned guidance."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "AI Guardian Team" },
]
keywords = ["ai", "security", "llm", "prompt-injection", "guardrails", "filtering"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/ai-guardian/ai-guardian"
Documentation = "https://ai-guardian-mauve.vercel.app/docs"
Repository = "https://github.com/ai-guardian/ai-guardian"

[tool.hatch.build.targets.wheel]
packages = ["ai_guardian"]
