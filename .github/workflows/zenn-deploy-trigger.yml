name: Trigger Zenn Deploy

on:
  schedule:
    # 明日 2026-04-07 朝8時 (JST) = 前日23時 (UTC) に1回だけ実行
    - cron: '0 23 6 4 *'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Zenn deploy with empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger Zenn deploy for guideline-v12 article"
          git push
